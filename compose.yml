services:
  database:
    image: postgres:17
    container_name: slimy-postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - slimy_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: slimy-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
    depends_on:
      - database

volumes:
  slimy_data:
